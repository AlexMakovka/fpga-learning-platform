{% extends "base.html" %}

{% block content %}

<a href="{{ url_for('teacher_panel') }}" class="btn btn-outline-secondary btn-sm mb-3">
    ← Назад в панель преподавателя
</a>

<div class="card shadow-sm border-0 rounded-4">
    <div class="card-body p-4">

        <h1 class="mb-3">Редактирование лабораторной работы</h1>

        <p class="text-muted">
            Здесь можно изменить название, описание задания и проверочный testbench-сценарий.
            Изменения будут применяться к новым проверкам студентов.
        </p>

        <form method="post" action="{{ url_for('edit_lab', lab_id=lab['id']) }}">

            <div class="mb-3">
                <label class="form-label">Название лабораторной работы</label>
                <input type="text"
                       name="title"
                       class="form-control"
                       value="{{ lab['title'] }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Описание задания</label>
                <textarea name="description"
                          rows="6"
                          class="form-control">{{ lab['description'] }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Проверочный сценарий testbench</label>
                <textarea name="testbench"
                          rows="18"
                          class="form-control code-area">{{ lab['testbench'] }}</textarea>
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-primary" type="submit">
                    Сохранить изменения
                </button>

                <a href="{{ url_for('teacher_panel') }}" class="btn btn-outline-secondary">
                    Отмена
                </a>
            </div>

        </form>

    </div>
</div>

{% endblock %}
