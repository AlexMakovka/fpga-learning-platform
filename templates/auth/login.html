{% extends "layouts/base.html" %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4">

                <h2 class="text-center mb-3">Вход в систему</h2>
                <p class="text-muted text-center">
                    Платформа автоматизированной проверки HDL-кода
                </p>

                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Логин</label>
                        <input type="text" name="username" class="form-control" placeholder="Введите логин">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        <input type="password" name="password" class="form-control" placeholder="Введите пароль">
                    </div>

                    <button class="btn btn-primary w-100" type="submit">
                        Войти
                    </button>

                    <div class="mt-3 text-center">
                        <a href="{{ url_for('register') }}">
                            Зарегистрироваться
                        </a>
                    </div>
                </form>

                <hr>

                <div class="small text-muted">
                    <p class="mb-1"><b>Студент:</b> student1 / student123</p>
                    <p class="mb-1"><b>Преподаватель:</b> teacher / teacher123</p>
                    <p class="mb-0"><b>Администратор:</b> admin / admin123</p>
                </div>

            </div>
        </div>
    </div>
</div>

{% endblock %}
